<!doctype html>
<html>
    <head>
        <title>Example game</title>
        <link rel="stylesheet" href="./styles.css" type="text/css" />
    </head>
    <body>
        <h1 class="title">Whack a mole</h1>

        <div class="center">
            <div class="board">
                <div class="hole">
                    <img
                        class="mole"
                        src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/mole.png?raw=true"
                        alt="Mole"
                        width="80"
                    />
                    <img
                        class="mole-hit hidden"
                        src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/mole-whacked.png?raw=true"
                        alt="Mole Hit"
                        width="80"
                    />
                </div>
                <div class="hole">
                    <img
                        class="mole"
                        src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/mole.png?raw=true"
                        alt="Mole"
                        width="80"
                    />
                    <img
                        class="mole-hit hidden"
                        src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/mole-whacked.png?raw=true"
                        alt="Mole Hit"
                        width="80"
                    />
                </div>
                <div class="hole">
                    <img
                        class="mole"
                        src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/mole.png?raw=true"
                        alt="Mole"
                        width="80"
                    />
                    <img
                        class="mole-hit hidden"
                        src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/mole-whacked.png?raw=true"
                        alt="Mole Hit"
                        width="80"
                    />
                </div>
            </div>
        </div>

        <div class="hammer">
            <img
                src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/hammer.png?raw=true"
                alt="Hammer"
                width="150"
            />
        </div>

        <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js"></script>
        <script type="text/javascript" src="scripts.js"></script>

  <h3 class="subs">CLICK ON THE MOLE TO SOCRE A POINT</h3>
  <h2 class="score">Your score:</h2>
  <h2 id="score">0</h2>
  <h2 class="time">Time Left:</h2>
  <h2 id="time-left">60</h2>
  <div class="card">
    <div class="grid main">
      <div class="square container" id="1"></div>
      <div class="square container" id="2"></div>
      <div class="square container" id="3"></div>
      <div class="square container" id="4"></div>
      <div class="square container" id="5"></div>
      <div class="square container" id="6"></div>
      <div class="square container" id="7"></div>
      <div class="square container" id="8"></div>
      <div class="square container" id="9"></div>
    </div>
  </div>
  <button class="button1" onclick=refresh()>Start</button>
  <h4 class="subs">CLICK THIS BUTTON TO Start NEW GAME</h4>
  <script src="app.js"></script>
    </body>
</html>
