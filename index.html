<!doctype html>
<html>
    <head>
        <title>Example game</title>
        <link rel="stylesheet" href="./styles.css" type="text/css" />
    </head>
    <body>
        <h1 class="title">Whack a mole</h1>

        <div class="center">
            <div class="board">
                <div class="hole">
                    <img
                        class="mole"
                        src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/mole.png?raw=true"
                        alt="Mole"
                        width="80"
                    />
                    <img
                        class="mole-hit hidden"
                        src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/mole-whacked.png?raw=true"
                        alt="Mole Hit"
                        width="80"
                    />
                </div>
                <div class="hole">
                    <img
                        class="mole"
                        src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/mole.png?raw=true"
                        alt="Mole"
                        width="80"
                    />
                    <img
                        class="mole-hit hidden"
                        src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/mole-whacked.png?raw=true"
                        alt="Mole Hit"
                        width="80"
                    />
                </div>
                <div class="hole">
                    <img
                        class="mole"
                        src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/mole.png?raw=true"
                        alt="Mole"
                        width="80"
                    />
                    <img
                        class="mole-hit hidden"
                        src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/mole-whacked.png?raw=true"
                        alt="Mole Hit"
                        width="80"
                    />
                </div>
            </div>
        </div>

        <div class="hammer">
            <img
                src="https://github.com/jahidulislamzim/whack-a-mole/blob/main/assets/hammer.png?raw=true"
                alt="Hammer"
                width="150"
            />
        </div>

        <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js"></script>
        <script type="text/javascript" src="scripts.js"></script>
    </body>
</html>
